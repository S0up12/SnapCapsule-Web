services:
  snapcapsule-backend:
    image: ghcr.io/s0up12/snapcapsule-backend:latest
    container_name: snapcapsule-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      SNAPCAPSULE_DATA_DIR: /data
      SNAPCAPSULE_DATABASE_DIR: /data/database
      SNAPCAPSULE_CACHE_DIR: /data/cache
      SNAPCAPSULE_IMPORTS_DIR: /data/imports
    volumes:
      - ${DATABASE_DIR:-./data/database}:/data/database
      - ${CACHE_DIR:-./data/cache}:/data/cache
      - ${IMPORTS_DIR:-./data/imports}:/data/imports
    restart: unless-stopped
  snapcapsule-frontend:
    image: ghcr.io/s0up12/snapcapsule-frontend:latest
    container_name: snapcapsule-frontend
    depends_on:
      - snapcapsule-backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped
